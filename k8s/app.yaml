# БЭКЕНД
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: trialextime/labserver-backend:v1
        ports:
        - containerPort: 5288
        env:
        - name: ConnectionStrings__PgSQL
          value: "Host=db-service;Port=5432;Database=labs;Username=postgres;Password=changeit"
        livenessProbe:
          tcpSocket:
            port: 5288
          initialDelaySeconds: 60
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
spec:
  selector:
    app: backend
  ports:
  - port: 80
    targetPort: 5288

---
# ФРОНТЕНД - ДАШБОРД
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dashboard
spec:
  selector:
    matchLabels:
      app: dashboard
  template:
    metadata:
      labels:
        app: dashboard
    spec:
      containers:
      - name: dashboard
        image: trialextime/labserver-dashboard:v1
        ports:
        - containerPort: 4200
        livenessProbe:
          tcpSocket:
            port: 4200
          initialDelaySeconds: 120
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: dashboard-service
spec:
  selector:
    app: dashboard
  type: NodePort
  ports:
  - port: 80
    targetPort: 4200
    nodePort: 30000